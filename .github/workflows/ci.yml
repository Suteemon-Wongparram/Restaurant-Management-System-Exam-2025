name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
      JWT_SECRET: ci-test-secret
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
      PORT: 3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Prisma db push (CI database)
        working-directory: backend
        run: npx prisma db push --skip-generate

      - name: Run backend unit tests (Vitest)
        working-directory: backend
        run: npm test

      - name: Backend security audit (npm audit)
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend security audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Newman Global Tools
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Background Server and Newman E2E Tests
        working-directory: backend
        run: npm run ci:e2e

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: tests/postman/newman-report.html